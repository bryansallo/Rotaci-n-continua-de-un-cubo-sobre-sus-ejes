<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cubo PRO</title>
<style>
body { margin: 0; overflow: hidden; background: black; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// ESCENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// CÁMARA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

// RENDER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// GEOMETRÍA
const geometry = new THREE.BoxGeometry(1,1,1);

// 🎨 MATERIALES (uno por cara)
const materiales = [
    new THREE.MeshStandardMaterial({ color: 0xff0000 }), 
    new THREE.MeshStandardMaterial({ color: 0x00ff00 }), 
    new THREE.MeshStandardMaterial({ color: 0x0000ff }), 
    new THREE.MeshStandardMaterial({ color: 0xffff00 }), 
    new THREE.MeshStandardMaterial({ color: 0xff00ff }), 
    new THREE.MeshStandardMaterial({ color: 0x00ffff })  
];

// CREAR CUBO
const cubo = new THREE.Mesh(geometry, materiales);
scene.add(cubo);

// ✨ LÍNEAS NEÓN (bordes)
const edges = new THREE.EdgesGeometry(geometry);
const lineMaterial = new THREE.LineBasicMaterial({
    color: 0x00ffff // color neón (cyan)
});
const lineas = new THREE.LineSegments(edges, lineMaterial);
cubo.add(lineas); // se agregan al cubo

// 💡 LUCES
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

// 🔄 ANIMACIÓN
function animate() {
    requestAnimationFrame(animate);

    // rotación continua
    cubo.rotation.x += 0.01;
    cubo.rotation.y += 0.01;

    renderer.render(scene, camera);
}

animate();

// 📱 RESPONSIVO
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
